<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HanyuMaster - Chinese Learning App</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="shortcut icon" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <!-- SheetJS will be dynamically loaded via script.js -->
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">Hanyu<span>Master</span></div>
      <div class="nav-links">
        <button onclick="showSection('manage')">
          <i class="fas fa-book"></i> <span>Manage</span>
        </button>
        <button onclick="showSection('flashcard')">
          <i class="fas fa-clone"></i> <span>Flashcards</span>
        </button>
        <button onclick="showSection('quiz')">
          <i class="fas fa-tasks"></i> <span>Quiz</span>
        </button>
        <button id="theme-toggle"><i class="fas fa-moon"></i></button>
      </div>
    </nav>

    <main class="container">
      <!-- MANAGEMENT SECTION -->
      <section id="manage-section" class="active">
        <div class="card">
          <h2>Thư viện từ vựng</h2>
          <div class="input-group">
            <input
              type="text"
              id="chinese-input"
              placeholder="Nhập Hanzi (VD: 学习)"
            />
            <select id="pos-input" class="pos-select">
              <option value="none">Từ loại (Auto)</option>
              <option value="noun">Danh từ</option>
              <option value="verb">Động từ</option>
              <option value="pronoun">Đại từ</option>
              <option value="adj">Tính từ</option>
            </select>
            <button id="add-btn" class="btn-primary">Thêm</button>
          </div>

          <div class="import-tools">
            <p>Thêm file excel vào đây(.xlsx)</p>
            <input
              type="file"
              id="excel-upload"
              accept=".xlsx, .xls, .csv"
              hidden
            />
            <button
              class="btn-secondary"
              onclick="document.getElementById('excel-upload').click()"
            >
              <i class="fas fa-file-import"></i> Import Excel
            </button>
            <button class="btn-text" onclick="downloadTemplate()">
              Tải Mẫu Excel
            </button>
          </div>
        </div>

        <div class="decks-section">
          <div class="library-header">
            <h3>Bộ từ vựng của bạn</h3>
            <button
              class="btn-primary btn-sm"
              style="padding: 6px 12px"
              onclick="createNewDeck()"
            >
              + Bộ mới
            </button>
          </div>
          <div id="decks-list" class="decks-carousel"></div>
        </div>

        <div class="library-header" style="margin-top: 2rem">
          <h3>
            Từ vựng: <span id="current-deck-name">Mặc định</span> (<span
              id="vocab-count"
              >0</span
            >
            từ)
          </h3>
          <button class="btn-danger-outline" onclick="resetProgress()">
            Xoá Bộ Này
          </button>
        </div>
        <div id="vocab-list" class="vocab-grid"></div>
      </section>

      <!-- FLASHCARD SECTION -->
      <section id="flashcard-section">
        <div class="stats-bar">
          <span>Score: <b id="flash-score" class="correct">0</b></span>
          <div class="practice-modes">
            <select
              id="flashcard-deck-select"
              class="pos-select"
              style="padding: 5px; font-size: 0.9rem"
              onchange="loadFlashcard()"
            >
              <option value="all">Tất cả các bộ</option>
            </select>
            <label
              ><input
                type="radio"
                name="practice-type"
                value="word"
                checked
                onchange="changePracticeType()"
              />
              Từ vựng</label
            >
            <label
              ><input
                type="radio"
                name="practice-type"
                value="sentence"
                onchange="changePracticeType()"
              />
              Mẫu câu</label
            >
          </div>
          <button class="btn-sm" onclick="toggleFlashMode()">
            <i class="fas fa-sync"></i> Swap Mode
          </button>
        </div>
        <div class="card flash-card">
          <div id="flash-mode-label" class="label">
            Dịch sang tiếng Trung Quốc:
          </div>
          <div
            id="sentence-warning"
            class="hidden"
            style="
              color: var(--text-sub);
              font-size: 0.8rem;
              margin-top: -10px;
              margin-bottom: 10px;
            "
          >
            ⚠️ Auto-generated sentence for structure practice
          </div>
          <div id="flash-prompt" class="prompt-text">---</div>
          <div id="flash-feedback" class="feedback"></div>
          <div class="input-container">
            <input
              type="text"
              id="flash-answer"
              placeholder="Đáp án..."
              autocomplete="off"
            />
          </div>
          <div class="controls">
            <button id="flash-submit" class="btn-primary">Check</button>
            <button id="flash-next" class="btn-secondary">Next / Skip</button>
          </div>
        </div>
      </section>

      <!-- QUIZ SECTION -->
      <section id="quiz-section">
        <div class="stats-bar">
          <span>Quiz Score: <b id="quiz-score" class="correct">0</b></span>
        </div>
        <div class="card quiz-card">
          <div class="label">Chọn từ trung đúng:</div>
          <div id="quiz-question" class="prompt-text">---</div>
          <div id="quiz-options" class="options-grid"></div>
          <div id="quiz-feedback" class="feedback"></div>
          <button id="quiz-next" class="btn-primary hidden">
            Next Question
          </button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
